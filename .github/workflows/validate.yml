name: Valider posts.csv

on:
  push:
    paths:
      - "posts.csv"
  pull_request:
    paths:
      - "posts.csv"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout images (autopost-assets)
        uses: actions/checkout@v4
        with:
          repository: courtierleandro-jpg/autopost-assets
          path: images

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Valider posts.csv
        run: cd src && python validate.py
