name: Autopost

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 min (UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Simulation sans publier (dry run)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write   # nécessaire pour commit/push published.json

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout images (autopost-assets)
        uses: actions/checkout@v4
        with:
          repository: courtierleandro-jpg/autopost-assets
          path: images

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Installer ffmpeg (fallback vidéo TikTok)
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg

      - name: Publier les posts dus
        env:
          # Instagram / Meta
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IMAGES_BASE_URL: ${{ secrets.IMAGES_BASE_URL }}
          # TikTok
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          TIKTOK_DIRECT_POST: ${{ secrets.TIKTOK_DIRECT_POST }}
          TIKTOK_FORCE_VIDEO: ${{ secrets.TIKTOK_FORCE_VIDEO }}
          # Notifications Discord (optionnel)
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Auto-update secrets après refresh token (optionnel)
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Mode simulation
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: cd src && python main.py

      - name: Commit published.json si modifié
        run: |
          git config user.name "autopost[bot]"
          git config user.email "autopost@users.noreply.github.com"
          git add published.json
          if git diff --staged --quiet; then
            echo "published.json inchangé — rien à commiter."
          else
            git commit -m "chore: mise à jour published.json [skip ci]"
            git push
          fi
